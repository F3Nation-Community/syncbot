_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: SyncBot
  description: Sync chat threads between Slack Workspaces.
  background_color: "#1A1D21"

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: true
  bot_user:
    display_name: SyncBot
    always_online: true

oauth_config:
  redirect_urls:
    - https://your-random-tunnel-name.trycloudflare.com/slack/oauth_redirect
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:join
      - channels:read
      - channels:manage
      - chat:write
      - chat:write.customize
      - files:read
      - files:write
      - groups:history
      - groups:read
      - groups:write
      - im:write
      - reactions:read
      - reactions:write
      - team:read
      - users:read
      - users:read.email
    user:
      - app_mentions:read
      - channels:history
      - channels:join
      - channels:read
      - channels:manage
      - files:read
      - files:write
      - groups:history
      - groups:read
      - groups:write
      - im:write
      - chat:write:user
      - reactions:read
      - reactions:write
      - team:read
      - users:read
      - users:read.email

settings:
  event_subscriptions:
    request_url: https://your-random-tunnel-name.trycloudflare.com/slack/events
    bot_events:
      - app_home_opened
      - member_joined_channel
      - message.channels
      - message.groups
      - reaction_added
      - reaction_removed
      - team_join
      - tokens_revoked
      - user_profile_changed
  interactivity:
    is_enabled: true
    request_url: https://your-random-tunnel-name.trycloudflare.com/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
