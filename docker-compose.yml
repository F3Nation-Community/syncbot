services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_ROOT_HOST: "%"   # allow root from host (e.g. mysql -h 127.0.0.1 -P 3306 -u root -p)
      MYSQL_DATABASE: syncbot
    ports:
      - "3306:3306"
    volumes:
      - syncbot-db:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      DATABASE_HOST: db
      ADMIN_DATABASE_USER: root
      ADMIN_DATABASE_PASSWORD: rootpass
      ADMIN_DATABASE_SCHEMA: syncbot
      # Slack — replace with your values or use a .env file
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-xoxb-your-bot-token}
      # Optional
      PASSWORD_ENCRYPT_KEY: ${PASSWORD_ENCRYPT_KEY:-123}
      REQUIRE_ADMIN: ${REQUIRE_ADMIN:-true}
    volumes:
      - ./syncbot:/app/syncbot

volumes:
  syncbot-db:
