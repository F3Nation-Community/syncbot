AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  SyncBot - Slack app that syncs posts and replies across workspaces.
  Free-tier compatible: Lambda, API Gateway, RDS PostgreSQL or MySQL (db.t3.micro).
  OAuth and app data use RDS; media is uploaded directly to Slack.
  SAM deploy uses an S3 artifact bucket for packaging only (not runtime).
  Template lives under infra/aws; CodeUri points at repo-root syncbot/.

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Tracing: Active
  Api:
    TracingEnabled: true
    MethodSettings:
      - ResourcePath: "/*"
        HttpMethod: "*"
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10

# ================================================================
# Parameters
# ================================================================

Parameters:
  Stage:
    Description: Deployment stage
    Type: String
    Default: test
    AllowedValues:
      - test
      - prod

  DatabaseEngine:
    Description: >
      SQL engine for new or existing RDS host. Use postgresql for Aurora DSQL or RDS PostgreSQL;
      use mysql for legacy RDS MySQL.
    Type: String
    Default: postgresql
    AllowedValues:
      - postgresql
      - mysql

  # --- Slack ---

  SlackSigningSecret:
    Description: Slack signing secret for request verification
    Type: String
    NoEcho: true
    Default: "123"

  SlackClientID:
    Description: >
      Slack OAuth app Client ID (Basic Information → App Credentials).
      Required for your Slack app; use the ID from the app you created for this deploy.
    Type: String
    Default: ""

  SlackClientSecret:
    Description: Slack OAuth client secret
    Type: String
    NoEcho: true
    Default: "123"

  SlackOauthScopes:
    Description: Comma-separated list of Slack OAuth scopes
    Type: String
    Default: "app_mentions:read,channels:history,channels:join,chat:write,chat:write:user,chat:write.customize,commands,files:read,files:write,team:read,users:read,channels:manage,users:read.email,reactions:read,reactions:write"

  # --- Database (RDS) ---

  ExistingDatabaseHost:
    Description: >
      Endpoint of an existing RDS instance (e.g. mydb.xxxx.us-east-2.rds.amazonaws.com).
      Leave EMPTY to create a new RDS instance. When set, all VPC and RDS
      resources are skipped and the deploy creates the schema and app user for you.
    Type: String
    Default: ""

  ExistingDatabaseAdminUser:
    Description: >
      MySQL user that can create databases and users (e.g. master). Used only when
      ExistingDatabaseHost is set; the deploy creates a dedicated app user and schema.
    Type: String
    Default: ""

  ExistingDatabaseAdminPassword:
    Description: Password for ExistingDatabaseAdminUser. Used only when using existing host.
    Type: String
    NoEcho: true
    Default: ""

  ExistingDatabaseNetworkMode:
    Description: >
      Network mode for existing database host. Use "public" when the existing RDS
      endpoint is reachable from the public internet. Use "private" when it is only
      reachable from within a VPC.
    Type: String
    Default: public
    AllowedValues:
      - public
      - private

  ExistingDatabaseSubnetIdsCsv:
    Description: >
      Comma-separated subnet IDs for Lambda VPC attachment when using an existing
      private database host (for example "subnet-aaa,subnet-bbb").
      Ignored unless ExistingDatabaseHost is set and ExistingDatabaseNetworkMode=private.
    Type: String
    Default: ""

  ExistingDatabaseLambdaSecurityGroupId:
    Description: >
      Security group ID for Lambda VPC attachment when using an existing private
      database host. This security group must be allowed to connect to the DB (3306 MySQL, 5432 PostgreSQL).
      Ignored unless ExistingDatabaseHost is set and ExistingDatabaseNetworkMode=private.
    Type: String
    Default: ""

  DatabaseUser:
    Description: >
      Database username for new RDS only. When using an existing database
      (ExistingDatabaseHost set), leave BLANK — the deploy creates syncbot_<stage> and uses it.
    Type: String
    Default: ""

  DatabasePassword:
    Description: >
      Master password for new RDS only (min 8 chars). When using an existing database
      (ExistingDatabaseHost set), leave BLANK — the app user password is auto-generated.
    Type: String
    NoEcho: true
    Default: ""

  DatabaseSchema:
    Description: >
      MySQL database/schema name. Each app sharing an RDS instance
      should use a different schema name.
    Type: String
    Default: "syncbot"

  DatabaseInstanceClass:
    Description: "RDS instance class (db.t3.micro is free-tier eligible). Ignored when using an existing database."
    Type: String
    Default: db.t3.micro
    AllowedValues:
      - db.t3.micro
      - db.t3.small
      - db.t3.medium
      - db.t4g.micro
      - db.t4g.small

  AllowedDBCidr:
    Description: >
      CIDR allowed to reach the database (e.g. your IP as x.x.x.x/32).
      Ignored when using an existing database.
    Type: String
    Default: "0.0.0.0/0"

  VpcCidr:
    Description: CIDR block for the VPC. Ignored when using an existing database.
    Type: String
    Default: "10.0.0.0/16"

  TokenEncryptionKeyOverride:
    Description: >
      Optional disaster-recovery override for TOKEN_ENCRYPTION_KEY.
      Use only when restoring an existing deployment with a known key.
      Leave empty for normal deploys (auto-generated Secret Manager key is used).
    Type: String
    NoEcho: true
    Default: ""

  ExistingTokenEncryptionKeySecretArn:
    Description: >
      Optional existing Secrets Manager secret ARN containing TOKEN_ENCRYPTION_KEY.
      Use this when the secret already exists (for example after a failed create/delete cycle)
      to avoid secret name collisions.
    Type: String
    Default: ""

  RequireAdmin:
    Description: >
      When "true" (default), only workspace admins and owners can
      configure SyncBot.  Set to "false" to allow any user.
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

# ================================================================
# Conditions
# ================================================================

Conditions:
  CreateDatabase: !Equals [!Ref ExistingDatabaseHost, ""]
  UseExistingDatabase: !Not [!Equals [!Ref ExistingDatabaseHost, ""]]
  IsMysqlEngine: !Equals [!Ref DatabaseEngine, mysql]
  IsPostgresqlEngine: !Equals [!Ref DatabaseEngine, postgresql]
  CreateDatabaseMysql: !And [!Condition CreateDatabase, !Condition IsMysqlEngine]
  CreateDatabasePostgresql: !And [!Condition CreateDatabase, !Condition IsPostgresqlEngine]
  UseExistingDatabasePrivateVpc: !And
    - !Condition UseExistingDatabase
    - !Equals [!Ref ExistingDatabaseNetworkMode, "private"]
  HasTokenEncryptionKeyOverride: !Not [!Equals [!Ref TokenEncryptionKeyOverride, ""]]
  HasExistingTokenEncryptionKeySecretArn: !Not [!Equals [!Ref ExistingTokenEncryptionKeySecretArn, ""]]
  CreateTokenEncryptionKeySecret: !And
    - !Not [!Condition HasTokenEncryptionKeyOverride]
    - !Not [!Condition HasExistingTokenEncryptionKeySecretArn]
  HasSlackClientID: !Not [!Equals [!Ref SlackClientID, ""]]

Mappings:
  StagesMap:
    test:
      SlackClientID: "1966318390773.6037875913205"
      KeepWarmName: "SyncBotKeepWarmTest"
    prod:
      SlackClientID: "1990266264068.6053437451057"
      KeepWarmName: "SyncBotKeepWarmProd"

Resources:
  # ============================================================
  # Networking
  # ============================================================

  VPC:
    Type: AWS::EC2::VPC
    Condition: CreateDatabase
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "syncbot-${Stage}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: CreateDatabase
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "syncbot-${Stage}-igw"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: CreateDatabase
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Condition: CreateDatabase
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 4, 8]]
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "syncbot-${Stage}-public-1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Condition: CreateDatabase
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidr, 4, 8]]
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "syncbot-${Stage}-public-2"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: CreateDatabase
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "syncbot-${Stage}-public-rt"

  PublicRoute:
    Type: AWS::EC2::Route
    Condition: CreateDatabase
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateDatabase
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateDatabase
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: CreateDatabase
    Properties:
      GroupDescription: Controls access to the SyncBot RDS instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref AllowedDBCidr
          Description: "MySQL (if DatabaseEngine=mysql)"
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref AllowedDBCidr
          Description: "PostgreSQL (if DatabaseEngine=postgresql)"
      Tags:
        - Key: Name
          Value: !Sub "syncbot-${Stage}-rds-sg"

  # ============================================================
  # RDS MySQL / PostgreSQL
  # ============================================================

  RDSParameterGroupMysql:
    Type: AWS::RDS::DBParameterGroup
    Condition: CreateDatabaseMysql
    Properties:
      Family: mysql8.0
      Description: !Sub "SyncBot ${Stage} MySQL - SSL"
      Parameters:
        require_secure_transport: "1"
      Tags:
        - Key: Name
          Value: !Sub "syncbot-${Stage}-db-params-mysql"

  RDSParameterGroupPostgres:
    Type: AWS::RDS::DBParameterGroup
    Condition: CreateDatabasePostgresql
    Properties:
      Family: postgres16
      Description: !Sub "SyncBot ${Stage} PostgreSQL"
      Tags:
        - Key: Name
          Value: !Sub "syncbot-${Stage}-db-params-pg"

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Condition: CreateDatabase
    Properties:
      DBSubnetGroupDescription: Subnet group for SyncBot RDS
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub "syncbot-${Stage}-db-subnet-group"

  RDSInstanceMysql:
    Type: AWS::RDS::DBInstance
    Condition: CreateDatabaseMysql
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "syncbot-${Stage}-mysql"
      DBInstanceClass: !Ref DatabaseInstanceClass
      Engine: mysql
      EngineVersion: "8.0"
      MasterUsername: !Ref DatabaseUser
      MasterUserPassword: !Ref DatabasePassword
      DBName: !Ref DatabaseSchema
      AllocatedStorage: 20
      StorageType: gp2
      StorageEncrypted: true
      PubliclyAccessible: true
      MultiAZ: false
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBParameterGroupName: !Ref RDSParameterGroupMysql
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      BackupRetentionPeriod: 7
      PreferredBackupWindow: "03:00-04:00"
      PreferredMaintenanceWindow: "sun:04:00-sun:05:00"
      DeletionProtection: true
      Tags:
        - Key: Name
          Value: !Sub "syncbot-${Stage}-db-mysql"

  RDSInstancePostgres:
    Type: AWS::RDS::DBInstance
    Condition: CreateDatabasePostgresql
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "syncbot-${Stage}-pg"
      DBInstanceClass: !Ref DatabaseInstanceClass
      Engine: postgres
      EngineVersion: "16.6"
      MasterUsername: !Ref DatabaseUser
      MasterUserPassword: !Ref DatabasePassword
      DBName: !Ref DatabaseSchema
      AllocatedStorage: 20
      StorageType: gp2
      StorageEncrypted: true
      PubliclyAccessible: true
      MultiAZ: false
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBParameterGroupName: !Ref RDSParameterGroupPostgres
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      BackupRetentionPeriod: 7
      PreferredBackupWindow: "03:00-04:00"
      PreferredMaintenanceWindow: "sun:04:00-sun:05:00"
      DeletionProtection: true
      Tags:
        - Key: Name
          Value: !Sub "syncbot-${Stage}-db-pg"

  TokenEncryptionKeySecret:
    Type: AWS::SecretsManager::Secret
    Condition: CreateTokenEncryptionKeySecret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "syncbot-${Stage}-token-encryption-key"
      Description: !Sub "SyncBot ${Stage} token encryption key (backup required)"
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true
        IncludeSpace: false

  # --- Existing RDS: generated app password and setup Lambda ---
  AppDbCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Condition: UseExistingDatabase
    Properties:
      Name: !Sub "syncbot-${Stage}-app-db-password"
      Description: !Sub "SyncBot ${Stage} app DB user password (created by stack)"
      GenerateSecretString:
        PasswordLength: 32
        ExcludePunctuation: true
        IncludeSpace: false

  DbSetupFunction:
    Type: AWS::Serverless::Function
    Condition: UseExistingDatabase
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: db_setup/
      Handler: handler.handler
      Runtime: python3.12
      Architectures:
        - x86_64
      Timeout: 60
      MemorySize: 256
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref AppDbCredentialsSecret
      VpcConfig: !If
        - UseExistingDatabasePrivateVpc
        - SubnetIds: !Split [",", !Ref ExistingDatabaseSubnetIdsCsv]
          SecurityGroupIds:
            - !Ref ExistingDatabaseLambdaSecurityGroupId
        - !Ref AWS::NoValue

  AppDbSetup:
    Type: Custom::ExistingRDSSetup
    Condition: UseExistingDatabase
    DependsOn: DbSetupFunction
    Properties:
      ServiceToken: !GetAtt DbSetupFunction.Arn
      Host: !Ref ExistingDatabaseHost
      AdminUser: !Ref ExistingDatabaseAdminUser
      AdminPassword: !Ref ExistingDatabaseAdminPassword
      Schema: !Ref DatabaseSchema
      Stage: !Ref Stage
      SecretArn: !Ref AppDbCredentialsSecret
      DatabaseEngine: !Ref DatabaseEngine

  # ============================================================
  # Lambda Function
  # ============================================================

  SyncBotFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../syncbot/
      Handler: app.handler
      Runtime: python3.12
      Architectures:
        - x86_64
      Timeout: 30
      MemorySize: 128
      Policies:
        - AWSLambdaVPCAccessExecutionRole
      VpcConfig: !If
        - UseExistingDatabasePrivateVpc
        - SubnetIds: !Split [",", !Ref ExistingDatabaseSubnetIdsCsv]
          SecurityGroupIds:
            - !Ref ExistingDatabaseLambdaSecurityGroupId
        - !Ref AWS::NoValue
      Events:
        SyncBot:
          Type: Api
          Properties:
            Path: /slack/events
            Method: post
        SyncBotInstall:
          Type: Api
          Properties:
            Path: /slack/install
            Method: get
        SyncBotOAuthRedirect:
          Type: Api
          Properties:
            Path: /slack/oauth_redirect
            Method: get
        SyncBotKeepWarm:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "rate(5 minutes)"
            Name: !FindInMap
              - StagesMap
              - !Ref Stage
              - KeepWarmName
      Environment:
        Variables:
          SLACK_BOT_TOKEN: "123"
          SLACK_SIGNING_SECRET: !Ref SlackSigningSecret
          ENV_SLACK_CLIENT_SECRET: !Ref SlackClientSecret
          ENV_SLACK_SCOPES: !Ref SlackOauthScopes
          ENV_SLACK_CLIENT_ID: !If
            - HasSlackClientID
            - !Ref SlackClientID
            - !FindInMap
              - StagesMap
              - !Ref Stage
              - SlackClientID
          DATABASE_BACKEND: !Ref DatabaseEngine
          DATABASE_PORT: !If
            - IsMysqlEngine
            - "3306"
            - "5432"
          DATABASE_HOST: !If
            - UseExistingDatabase
            - !Ref ExistingDatabaseHost
            - !If
              - IsMysqlEngine
              - !GetAtt RDSInstanceMysql.Endpoint.Address
              - !GetAtt RDSInstancePostgres.Endpoint.Address
          DATABASE_USER: !If
            - UseExistingDatabase
            - !GetAtt AppDbSetup.Username
            - !Ref DatabaseUser
          DATABASE_PASSWORD: !If
            - UseExistingDatabase
            - !Sub
              - "{{resolve:secretsmanager:${SecretArn}:SecretString}}"
              - { SecretArn: !Ref AppDbCredentialsSecret }
            - !Ref DatabasePassword
          DATABASE_SCHEMA: !Ref DatabaseSchema
          TOKEN_ENCRYPTION_KEY: !If
            - HasTokenEncryptionKeyOverride
            - !Ref TokenEncryptionKeyOverride
            - !If
              - HasExistingTokenEncryptionKeySecretArn
              - !Sub
                - "{{resolve:secretsmanager:${SecretArn}:SecretString}}"
                - { SecretArn: !Ref ExistingTokenEncryptionKeySecretArn }
              - !Sub "{{resolve:secretsmanager:${TokenEncryptionKeySecret}:SecretString}}"
          REQUIRE_ADMIN: !Ref RequireAdmin

  # ============================================================
  # CloudWatch Alarms
  # ============================================================

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "syncbot-${Stage}-lambda-errors"
      AlarmDescription: >
        Fires when the SyncBot Lambda function produces 3 or more
        errors within a 5-minute window.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SyncBotFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  LambdaThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "syncbot-${Stage}-lambda-throttles"
      AlarmDescription: >
        Fires when the SyncBot Lambda function is throttled.
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref SyncBotFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  LambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "syncbot-${Stage}-lambda-duration"
      AlarmDescription: >
        Fires when average Lambda duration exceeds 10 seconds.
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref SyncBotFunction
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10000
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  ApiGateway5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "syncbot-${Stage}-api-5xx"
      AlarmDescription: >
        Fires when the API Gateway returns 5 or more 5xx errors
        within a 5-minute window.
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Ref ServerlessRestApi
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

# ================================================================
# Outputs
# ================================================================

Outputs:
  SyncBotApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/slack/events/"

  SyncBotInstallUrl:
    Description: Slack app installation URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/slack/install"

  SyncBotFunctionArn:
    Description: SyncBot Lambda function ARN
    Value: !GetAtt SyncBotFunction.Arn

  DatabaseHostInUse:
    Description: Database host the Lambda is configured to connect to
    Value: !If
      - UseExistingDatabase
      - !Ref ExistingDatabaseHost
      - !If
        - IsMysqlEngine
        - !GetAtt RDSInstanceMysql.Endpoint.Address
        - !GetAtt RDSInstancePostgres.Endpoint.Address

  RDSEndpoint:
    Condition: CreateDatabase
    Description: RDS endpoint (MySQL or PostgreSQL) when created by this stack
    Value: !If
      - IsMysqlEngine
      - !GetAtt RDSInstanceMysql.Endpoint.Address
      - !GetAtt RDSInstancePostgres.Endpoint.Address

  RDSPort:
    Condition: CreateDatabase
    Description: RDS port when created by this stack
    Value: !If
      - IsMysqlEngine
      - !GetAtt RDSInstanceMysql.Endpoint.Port
      - !GetAtt RDSInstancePostgres.Endpoint.Port

  VpcId:
    Condition: CreateDatabase
    Description: VPC ID (only when VPC is created by this stack)
    Value: !Ref VPC

  TokenEncryptionSecretArn:
    Description: Secrets Manager ARN containing TOKEN_ENCRYPTION_KEY
    Value: !If
      - HasExistingTokenEncryptionKeySecretArn
      - !Ref ExistingTokenEncryptionKeySecretArn
      - !Ref TokenEncryptionKeySecret
