on:
  push:
    branches:
      - test
      - prod

jobs:
  sam-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - run: sam build --use-container

      - name: Publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: './.aws-sam/build'

  sam-deploy-test:
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    environment: test
    needs: sam-build
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: './.aws-sam/build'

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Deploy to test
        run: |
          sam deploy \
            -t .aws-sam/build/template.yaml \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name ${{ vars.AWS_STACK_NAME }} \
            --s3-bucket ${{ vars.AWS_S3_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --region us-east-2 \
            --no-disable-rollback \
            --force-upload \
            --parameter-overrides \
              "Stage=${{ vars.STAGE_NAME }} \
               SlackClientSecret=${{ secrets.SLACK_CLIENT_SECRET }} \
               SlackSigningSecret=${{ secrets.SLACK_SIGNING_SECRET }} \
               DatabasePassword=${{ secrets.DATABASE_PASSWORD }} \
               PasswordEncryptKey=${{ secrets.PASSWORD_ENCRYPT_KEY }}"

  sam-deploy-prod:
    if: github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    environment: prod
    needs: sam-build
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: './.aws-sam/build'

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Deploy to prod
        run: |
          sam deploy \
            -t .aws-sam/build/template.yaml \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name ${{ vars.AWS_STACK_NAME }} \
            --s3-bucket ${{ vars.AWS_S3_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --region us-east-2 \
            --no-disable-rollback \
            --force-upload \
            --parameter-overrides \
              "Stage=${{ vars.STAGE_NAME }} \
               SlackClientSecret=${{ secrets.SLACK_CLIENT_SECRET }} \
               SlackSigningSecret=${{ secrets.SLACK_SIGNING_SECRET }} \
               DatabasePassword=${{ secrets.DATABASE_PASSWORD }} \
               PasswordEncryptKey=${{ secrets.PASSWORD_ENCRYPT_KEY }}"
