# Deploy SyncBot to AWS (SAM). See docs/DEPLOYMENT.md and docs/INFRA_CONTRACT.md.
# To use GCP instead: set repository variable DEPLOY_TARGET=gcp and disable this workflow.

name: Deploy (AWS)

on:
  push:
    branches:
      - test
      - prod

permissions:
  id-token: write
  contents: read

# Skip when using GCP (set DEPLOY_TARGET=gcp to use deploy-gcp.yml instead)
jobs:
  sam-build:
    if: vars.DEPLOY_TARGET != 'gcp'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - run: sam build -t infra/aws/template.yaml

      - name: Publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: './.aws-sam/build'

  sam-deploy-test:
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    environment: test
    needs: sam-build
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: './.aws-sam/build'

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Deploy to test
        run: |
          sam deploy \
            -t .aws-sam/build/template.yaml \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name ${{ vars.AWS_STACK_NAME }} \
            --s3-bucket ${{ vars.AWS_S3_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --region us-east-2 \
            --no-disable-rollback \
            --force-upload \
            --parameter-overrides \
              "Stage=${{ vars.STAGE_NAME }} \
               ExistingDatabaseHost=${{ vars.EXISTING_DATABASE_HOST }} \
               DatabaseUser=${{ vars.DATABASE_USER }} \
               DatabaseSchema=${{ vars.DATABASE_SCHEMA }} \
               SlackClientSecret=${{ secrets.SLACK_CLIENT_SECRET }} \
               SlackSigningSecret=${{ secrets.SLACK_SIGNING_SECRET }} \
               DatabasePassword=${{ secrets.DATABASE_PASSWORD }} \
               TokenEncryptionKey=${{ secrets.TOKEN_ENCRYPTION_KEY }}"

  sam-deploy-prod:
    if: github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    environment: prod
    needs: sam-build
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: './.aws-sam/build'

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Deploy to prod
        run: |
          sam deploy \
            -t .aws-sam/build/template.yaml \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name ${{ vars.AWS_STACK_NAME }} \
            --s3-bucket ${{ vars.AWS_S3_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --region us-east-2 \
            --no-disable-rollback \
            --force-upload \
            --parameter-overrides \
              "Stage=${{ vars.STAGE_NAME }} \
               ExistingDatabaseHost=${{ vars.EXISTING_DATABASE_HOST }} \
               DatabaseUser=${{ vars.DATABASE_USER }} \
               DatabaseSchema=${{ vars.DATABASE_SCHEMA }} \
               SlackClientSecret=${{ secrets.SLACK_CLIENT_SECRET }} \
               SlackSigningSecret=${{ secrets.SLACK_SIGNING_SECRET }} \
               DatabasePassword=${{ secrets.DATABASE_PASSWORD }} \
               TokenEncryptionKey=${{ secrets.TOKEN_ENCRYPTION_KEY }}"
